<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الزواج</title>
<link rel="stylesheet" href="style.css">
<style>
  .hero { text-align:center; padding:20px 0 30px; }
  .hero p { color:#666; font-size:15px; line-height:1.8; margin:16px 0; }
  .btn-group { display:flex; flex-direction:column; gap:12px; margin-top:20px; }
  .btn-group a { display:block; text-align:center; padding:14px; border-radius:8px; text-decoration:none; font-weight:600; }
  .btn-primary { background:#b08968; color:#fff; }
  .btn-secondary { background:#f0e9e2; color:#333; }
  .admin-link { display:block; text-align:center; margin-top:24px; font-size:13px; color:#999; }
</style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>منصة الزواج</h1>
      <p>منصة تعارف جادة وفق ضوابط شرعية، بإشراف كامل من الإدارة على كل حساب وكل طلب تواصل، لضمان الجدية والخصوصية.</p>
      <p style="font-size:13px">كل حساب يخضع لمراجعة الإدارة قبل ظهوره في نتائج البحث. لا صور على الإطلاق. مفيش أي رسوم أو اشتراكات.</p>
    </div>

    <div class="btn-group">
      <a href="register.html" class="btn-primary">إنشاء حساب جديد</a>
      <a href="login.html" class="btn-secondary">تسجيل الدخول</a>
      <a href="browse.html" class="btn-secondary">تصفح البروفايلات المعتمدة</a>
    </div>

    <a href="admin-login.html" class="admin-link">دخول الإدارة</a>
  </div>
</body>
</html>

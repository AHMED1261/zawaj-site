<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض البروفايل</title>
<link rel="stylesheet" href="style.css">
<style>
  .profile-container {
    max-width: 800px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .profile-header {
    text-align: center;
    border-bottom: 2px solid #eee;
    padding-bottom: 20px;
    margin-bottom: 20px;
  }
  .profile-header h2 {
    color: #b08968;
    margin: 0 0 10px 0;
  }
  .profile-header .badge {
    background: #7f8c8d;
    color: #fff;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 14px;
    display: inline-block;
    margin: 2px;
  }
  .section {
    margin-bottom: 30px;
  }
  .section h3 {
    color: #7f8c8d;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
    margin-bottom: 15px;
  }
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }
  .data-item strong {
    color: #555;
    display: block;
    font-size: 13px;
  }
  .data-item span {
    color: #222;
    font-size: 16px;
  }
  .full-width {
    grid-column: span 2;
  }
  .bio-box {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.6;
    color: #444;
  }
  .action-area {
    margin-top: 30px;
    text-align: center;
    padding-top: 20px;
    border-top: 2px solid #eee;
  }
  .btn-primary {
    background: #b08968;
    color: white;
    padding: 12px 30px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover {
    background: #9c785c;
  }
  .btn-guest {
    background: #e67e22;
  }
  .btn-guest:hover {
    background: #d35400;
  }
  
  @media (max-width: 600px) {
    .data-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
  }
</style>
</head>
<body>

<div class="profile-container" id="profileContent">
  <div style="text-align: center; padding: 50px;">
    <p>جاري التحميل...</p>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const profileId = urlParams.get('id');

if (!profileId) {
  document.getElementById('profileContent').innerHTML = '<p style="text-align:center; color:#c0392b;">معرف البروفايل مفقود.</p>';
} else {
  loadProfile();
}

const maritalLabels = { single:'أعزب', married:'متزوج', divorced:'مطلق', widowed:'أرمل', separated:'منفصل' };
const childrenLabels = { yes:'نعم', no:'لا', maybe:'لسه مقررش' };
const boolLabels = { yes:'نعم', no:'لا', sometimes:'أحيانًا' };
const jobTypeLabels = { government:'حكومي', private:'خاص', business_owner:'صاحب عمل' };
const incomeLabels = { normal:'عادي', medium:'متوسط', welloff:'ميسور', high:'عالي' };

function escapeHtml(text) {
  if (text === null || text === undefined || text === '') return '-';
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

async function loadProfile() {
  try {
    const res = await fetch('/api/profiles/' + profileId);
    const result = await res.json();
    
    if (!res.ok || !result.data) {
      document.getElementById('profileContent').innerHTML = `<p style="text-align:center; color:#c0392b;">${escapeHtml(result.error || 'حدث خطأ في تحميل البروفايل')}</p>`;
      return;
    }
    
    renderProfile(result.data);
  } catch (err) {
    document.getElementById('profileContent').innerHTML = '<p style="text-align:center; color:#c0392b;">تعذر الاتصال بالسيرفر.</p>';
  }
}

function renderProfile(p) {
  const container = document.getElementById('profileContent');
  const token = localStorage.getItem('token');
  const isLoggedIn = !!token;
  
  let actionHtml = '';
  if (isLoggedIn) {
    actionHtml = `<button onclick="handleSendRequest(${p.user_id})" class="btn-primary">إرسال طلب زواج</button>`;
  } else {
    actionHtml = `<a href="login.html" class="btn-primary btn-guest">سجل الدخول لإرسال طلب زواج</a>`;
  }
  
  const title = (p.gender === 'male' ? 'عريس' : 'عروس') + ' - ' + escapeHtml(p.age) + ' سنة';
  
  container.innerHTML = `
    <div class="profile-header">
      <h2>${title}</h2>
      <span class="badge">${escapeHtml(p.governorate)}</span>
      <span class="badge">${maritalLabels[p.marital_status] || escapeHtml(p.marital_status)}</span>
    </div>
    
    <div class="section">
      <h3>المواصفات الجسدية والعامة</h3>
      <div class="data-grid">
        <div class="data-item"><strong>العمر:</strong> <span>${escapeHtml(p.age)} سنة</span></div>
        <div class="data-item"><strong>الطول / الوزن:</strong> <span>${escapeHtml(p.height)} سم / ${escapeHtml(p.weight)} كجم</span></div>
        <div class="data-item"><strong>لون البشرة:</strong> <span>${escapeHtml(p.skin_color)}</span></div>
        <div class="data-item"><strong>الحالة الصحية:</strong> <span>${escapeHtml(p.health_issues)}</span></div>
      </div>
    </div>
    
    <div class="section">
      <h3>التعليم والعمل</h3>
      <div class="data-grid">
        <div class="data-item full-width"><strong>المؤهل الدراسي:</strong> <span>${escapeHtml(p.education)}</span></div>
        <div class="data-item"><strong>الوظيفة:</strong> <span>${escapeHtml(p.job)}</span></div>
        <div class="data-item"><strong>قطاع العمل:</strong> <span>${jobTypeLabels[p.job_type] || escapeHtml(p.job_type)}</span></div>
        <div class="data-item"><strong>مستوى الدخل:</strong> <span>${incomeLabels[p.income_level] || escapeHtml(p.income_level)}</span></div>
      </div>
    </div>
    
    <div class="section">
      <h3>الحالة الدينية والرياضية</h3>
      <div class="data-grid">
        <div class="data-item"><strong>مستوى التدين:</strong> <span>${escapeHtml(p.religiosity_level)}</span></div>
        <div class="data-item"><strong>الصلاة:</strong> <span>${boolLabels[p.prays_regularly] || escapeHtml(p.prays_regularly)}</span></div>
        <div class="data-item"><strong>التدخين:</strong> <span>${boolLabels[p.smoker] || escapeHtml(p.smoker)}</span></div>
        <div class="data-item"><strong>ممارسة الرياضة:</strong> <span>${boolLabels[p.exercises] || escapeHtml(p.exercises)}</span></div>
        ${p.gender === 'male' ? `
          <div class="data-item"><strong>اللحية:</strong> <span>${boolLabels[p.has_beard] || escapeHtml(p.has_beard)}</span></div>
          <div class="data-item"><strong>الرغبة في التعدد:</strong> <span>${boolLabels[p.wants_polygamy] || escapeHtml(p.wants_polygamy)}</span></div>
        ` : ''}
      </div>
    </div>
    
    <div class="section">
      <h3>الزواج والأسرة</h3>
      <div class="data-grid">
        <div class="data-item"><strong>الحالة الاجتماعية:</strong> <span>${maritalLabels[p.marital_status] || escapeHtml(p.marital_status)}</span></div>
        <div class="data-item"><strong>هل يوجد أبناء؟</strong> <span>${boolLabels[p.has_children] || escapeHtml(p.has_children)}</span></div>
        <div class="data-item"><strong>سكن الزوجية:</strong> <span>${escapeHtml(p.marital_home_location)}</span></div>
        <div class="data-item"><strong>الرغبة في الإنجاب:</strong> <span>${childrenLabels[p.wants_more_children] || escapeHtml(p.wants_more_children)}</span></div>
      </div>
    </div>
    
    <div class="section">
      <h3>نبذة عني</h3>
      <div class="bio-box">${escapeHtml(p.about_me)}</div>
    </div>
    
    <div class="section">
      <h3>مواصفات شريك الأحلام</h3>
      <div class="bio-box">${escapeHtml(p.partner_general_specs)}</div>
    </div>
    
    <div class="action-area">
      ${actionHtml}
    </div>
  `;
}

async function handleSendRequest(receiverId) {
  const token = localStorage.getItem('token');
  if (!token) return alert('يجب تسجيل الدخول أولاً');
  if (!confirm('هل أنت متأكد من إرسال طلب زواج لهذا الحساب؟')) return;
  
  try {
    const res = await fetch('/api/csrf-token');
    const { csrfToken } = await res.json();
    
    const reqRes = await fetch(`/api/requests/${receiverId}/send`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'CSRF-Token': csrfToken }
    });
    const data = await reqRes.json();
    alert(data.message || data.error);
  } catch (err) {
    alert('حدث خطأ في الاتصال');
  }
}
</script>
</body>
</html>

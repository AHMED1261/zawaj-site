<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<link rel="stylesheet" href="style.css">
<style>
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    margin-top: 20px;
  }
  @media (max-width: 768px) {
    .dashboard-grid { grid-template-columns: 1fr; }
  }
  .card-box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 4px;
    font-weight: bold;
    color: #fff;
  }
  .status-incomplete { background: #95a5a6; }
  .status-pending { background: #f39c12; }
  .status-needs_revision { background: #e67e22; }
  .status-approved { background: #27ae60; }
  .status-rejected { background: #c0392b; }
  .status-suspended { background: #000; }
  
  .notif-item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
  }
  .notif-item:last-child { border-bottom: none; }
  .notif-unread { font-weight: bold; background: #f9f9f9; border-left: 4px solid #3498db; padding-left: 10px; }
  .notif-date { font-size: 0.8em; color: #7f8c8d; }
  
  .pending-warning {
    background: #fef9e7;
    border: 1px solid #f1c40f;
    padding: 10px;
    border-radius: 4px;
    margin-top: 10px;
    font-size: 0.9em;
  }
</style>
</head>
<body>
  <div class="container wide">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
      <h1>لوحة التحكم</h1>
      <div>
        <a href="browse.html" class="button" style="text-decoration:none; background:#3498db;">تصفح البروفايلات</a>
        <button id="logoutBtn" style="background:#e74c3c;">تسجيل الخروج</button>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Sidebar -->
      <div>
        <div class="card-box">
          <h3>حالة الحساب</h3>
          <p id="accountStatus" style="margin: 10px 0;">جاري التحميل...</p>
          <div id="pendingWarning" class="pending-warning hidden">
            لديك تعديلات قيد المراجعة تم إرسالها في <span id="pendingDate"></span>.
          </div>
          <button id="editProfileBtn" style="width:100%; margin-top: 15px;">تعديل الاستمارة</button>
        </div>

        <div class="card-box">
          <h3>تاريخ الحساب</h3>
          <p style="font-size: 0.9em; margin-bottom: 5px;">تاريخ الإنشاء: <strong id="createdAtDate"></strong></p>
          <p style="font-size: 0.9em;">آخر تحديث: <strong id="updatedAtDate"></strong></p>
        </div>

        <div class="card-box">
          <h3>تغيير كلمة المرور</h3>
          <form id="passwordForm">
            <label>كلمة المرور الحالية <input type="password" name="current_password" required></label>
            <label>كلمة المرور الجديدة <input type="password" name="new_password" minlength="6" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}" title="يجب أن تحتوي على الأقل 6 أحرف، حرف كبير، حرف صغير، رقم، ورمز خاص" required></label>
            <button type="submit" style="width:100%">تغيير</button>
          </form>
          <p id="pwdMsg" style="font-size: 0.9em; margin-top: 10px;"></p>
        </div>
      </div>

      <!-- Main Content -->
      <div>
        <div class="card-box">
          <h3>الإشعارات <span id="unreadBadge" style="background:#e74c3c; color:#fff; border-radius:50%; padding:2px 8px; font-size:14px; display:none;">0</span></h3>
          <div id="notificationsList">جاري التحميل...</div>
        </div>

        <div class="card-box">
          <h3>طلباتي</h3>
          <p>ميزة طلبات الزواج ستتوفر قريباً إن شاء الله.</p>
        </div>
      </div>
    </div>
  </div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

const statusLabels = {
  'incomplete': { text: 'مسودة (لم تكتمل)', class: 'status-incomplete' },
  'pending': { text: 'قيد المراجعة', class: 'status-pending' },
  'needs_revision': { text: 'يحتاج لتعديل', class: 'status-needs_revision' },
  'approved': { text: 'معتمد', class: 'status-approved' },
  'rejected': { text: 'مرفوض', class: 'status-rejected' },
  'suspended': { text: 'موقوف', class: 'status-suspended' }
};

let csrfToken = '';

async function loadDashboard() {
  try {
    const res = await fetch('/api/user/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
      return;
    }
    const data = await res.json();
    
    // Status
    const statusData = statusLabels[data.profile.status] || { text: data.profile.status, class: 'status-incomplete' };
    document.getElementById('accountStatus').innerHTML = `<span class="status-badge ${statusData.class}">${statusData.text}</span>`;
    
    // Dates
    if (data.profile.created_at) document.getElementById('createdAtDate').textContent = new Date(data.profile.created_at).toLocaleDateString('ar-EG');
    if (data.profile.updated_at) document.getElementById('updatedAtDate').textContent = new Date(data.profile.updated_at).toLocaleDateString('ar-EG');
    
    // Pending edits
    if (data.pending_edit_date) {
      document.getElementById('pendingWarning').classList.remove('hidden');
      document.getElementById('pendingDate').textContent = new Date(data.pending_edit_date).toLocaleDateString('ar-EG');
    } else {
      document.getElementById('pendingWarning').classList.add('hidden');
    }

    // Unread notifications badge
    if (data.unread_notifications > 0) {
      const b = document.getElementById('unreadBadge');
      b.textContent = data.unread_notifications;
      b.style.display = 'inline-block';
    } else {
      document.getElementById('unreadBadge').style.display = 'none';
    }

    loadNotifications();
  } catch(err) {
    console.error(err);
  }
}

async function loadNotifications() {
  const list = document.getElementById('notificationsList');
  try {
    const res = await fetch('/api/user/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
    const notifs = await res.json();
    if (!notifs.length) {
      list.innerHTML = '<p>لا توجد إشعارات حالياً.</p>';
      return;
    }
    list.innerHTML = '';
    notifs.forEach(n => {
      const div = document.createElement('div');
      div.className = `notif-item ${n.is_read ? '' : 'notif-unread'}`;
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between;">
          <strong>${escapeHtml(n.title)}</strong>
          <span class="notif-date">${new Date(n.created_at).toLocaleString('ar-EG')}</span>
        </div>
        <p style="margin:5px 0;">${escapeHtml(n.message)}</p>
        ${!n.is_read ? `<button onclick="markAsRead(${n.id})" style="font-size:12px; padding:4px 8px;">تحديد كمقروء</button>` : ''}
      `;
      list.appendChild(div);
    });
  } catch(err) {
    list.innerHTML = '<p>حدث خطأ أثناء تحميل الإشعارات.</p>';
  }
}

async function markAsRead(id) {
  try {
    await fetch(`/api/user/notifications/${id}/read`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'CSRF-Token': csrfToken }
    });
    loadDashboard();
  } catch(err) {
    console.error(err);
  }
}

document.getElementById('passwordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const msg = document.getElementById('pwdMsg');
  msg.textContent = 'جاري التغيير...';
  try {
    const res = await fetch('/api/user/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'CSRF-Token': csrfToken },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) {
      msg.textContent = result.error;
      msg.style.color = 'red';
      return;
    }
    msg.textContent = result.message;
    msg.style.color = 'green';
    e.target.reset();
    
    // Invalidate session (logout)
    setTimeout(() => {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }, 2000);
  } catch(err) {
    msg.textContent = 'خطأ في الاتصال بالسيرفر';
    msg.style.color = 'red';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('token');
  localStorage.removeItem('gender');
  window.location.href = 'login.html';
});

document.getElementById('editProfileBtn').addEventListener('click', () => {
  window.location.href = 'form.html';
});

function escapeHtml(text) {
  if (text === null || text === undefined) return '';
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

(async () => {
  const res = await fetch('/api/csrf-token');
  const data = await res.json();
  csrfToken = data.csrfToken;
  loadDashboard();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>إنشاء حساب جديد</h1>
    <form id="registerForm">
      <label>رقم الهاتف
        <input type="tel" name="phone" placeholder="01xxxxxxxxx" required>
      </label>
      <label>كلمة المرور
        <input type="password" name="password" minlength="6" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}" title="يجب أن تحتوي على الأقل 6 أحرف، حرف كبير، حرف صغير، رقم، ورمز خاص" required>
      </label>
      <label>النوع
        <select name="gender" required>
          <option value="">اختر</option>
          <option value="male">عريس</option>
          <option value="female">عروس</option>
        </select>
      </label>
      <button type="submit">إنشاء الحساب</button>
    </form>
    <p id="msg"></p>
    <p>عندك حساب؟ <a href="login.html">سجّل دخول</a></p>
  </div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const msg = document.getElementById('msg');
  msg.textContent = 'جاري الإرسال...';
  try {
    const csrfRes = await fetch('/api/csrf-token');
    const csrfData = await csrfRes.json();
    const csrfToken = csrfData.csrfToken;

    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'CSRF-Token': csrfToken },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) { msg.textContent = result.error; msg.className = 'error'; return; }
    localStorage.setItem('token', result.token);
    localStorage.setItem('gender', data.gender);
    msg.textContent = 'تم إنشاء الحساب! هنحولك لاستمارة البيانات...';
    msg.className = 'success';
    setTimeout(() => window.location.href = 'form.html', 1200);
  } catch (err) {
    msg.textContent = 'حصل خطأ في الاتصال بالسيرفر';
    msg.className = 'error';
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التسجيل</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>استمارة التسجيل</h1>
    <form id="registerForm">
      <label>الاسم
        <input type="text" name="name" required>
      </label>

      <label>الإيميل
        <input type="email" name="email" required>
      </label>

      <label>كلمة المرور
        <input type="password" name="password" minlength="6" required>
      </label>

      <label>النوع
        <select name="gender" required>
          <option value="">اختر</option>
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
      </label>

      <label>السن
        <input type="number" name="age" min="18" max="90" required>
      </label>

      <label>المحافظة
        <input type="text" name="governorate">
      </label>

      <label>الحالة الاجتماعية
        <select name="maritalStatus" required>
          <option value="">اختر</option>
          <option value="single">أعزب / آنسة</option>
          <option value="divorced">مطلق / مطلقة</option>
          <option value="widowed">أرمل / أرملة</option>
        </select>
      </label>

      <label>عايز/عايزة تخلف؟
        <select name="wantsChildren" required>
          <option value="">اختر</option>
          <option value="yes">نعم</option>
          <option value="no">لا</option>
          <option value="maybe">لسه مش قرر</option>
        </select>
      </label>

      <label>الديانة
        <input type="text" name="religion">
      </label>

      <label>المؤهل الدراسي
        <input type="text" name="education">
      </label>

      <label>الوظيفة
        <input type="text" name="job">
      </label>

      <label>نبذة عنك
        <textarea name="bio" rows="4"></textarea>
      </label>

      <button type="submit">سجّل</button>
    </form>
    <p id="msg"></p>
    <p><a href="browse.html">تصفح البروفايلات</a></p>
  </div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form).entries());
  data.age = Number(data.age);

  const msg = document.getElementById('msg');
  msg.textContent = 'جاري الإرسال...';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (!res.ok) {
      msg.textContent = result.error || 'حصل خطأ';
      msg.className = 'error';
      return;
    }
    msg.textContent = 'تم التسجيل بنجاح! هنحولك لصفحة التصفح...';
    msg.className = 'success';
    setTimeout(() => window.location.href = 'browse.html', 1500);
  } catch (err) {
    msg.textContent = 'حصل خطأ في الاتصال بالسيرفر';
    msg.className = 'error';
  }
});
</script>
</body>
</html>

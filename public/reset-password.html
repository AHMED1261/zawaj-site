<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استرجاع الحساب | منصة الزواج</title><link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container auth-card">
    <a class="back-link" href="login.html">← العودة لتسجيل الدخول</a>
    <span class="eyebrow">استرجاع آمن</span>
    <h1>استرجع حسابك</h1>
    <p class="intro">سنرسل رمزًا إلى البريد الإلكتروني المرتبط بحسابك.</p>
    <form id="resetForm">
      <label>رقم الهاتف <div class="input-action"><input type="tel" name="phone" inputmode="numeric" placeholder="01xxxxxxxxx" required><button type="button" class="button-outline" id="sendCodeBtn">إرسال الرمز</button></div></label>
      <label>البريد الإلكتروني <input type="email" name="email" autocomplete="email" required></label>
      <label>رمز البريد الإلكتروني <input type="text" name="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required></label>
      <label>كلمة المرور الجديدة <input type="password" name="password" minlength="8" autocomplete="new-password" required></label>
      <button type="submit">تغيير كلمة المرور</button>
    </form>
    <p id="msg" role="status"></p>
  </main>
  <script>
    const form = document.getElementById('resetForm'), msg = document.getElementById('msg');
    document.getElementById('sendCodeBtn').addEventListener('click', async () => {
      const button = document.getElementById('sendCodeBtn'); button.disabled = true; msg.textContent='جاري إرسال الرمز...'; msg.className='';
      try { const res=await fetch('/api/auth/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:form.phone.value,email:form.email.value,purpose:'reset_password'})}); const data=await res.json(); if(!res.ok) throw new Error(data.error); msg.textContent=data.message; msg.className='success'; }
      catch(error){ msg.textContent=error.message || 'تعذر إرسال الرمز.'; msg.className='error'; } finally { button.disabled=false; }
    });
    form.addEventListener('submit', async event => { event.preventDefault(); const button=form.querySelector('[type="submit"]'); button.disabled=true; msg.textContent='جاري تغيير كلمة المرور...'; try { const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(form)))}); const data=await res.json(); if(!res.ok) throw new Error(data.error); msg.textContent=data.message; msg.className='success'; setTimeout(()=>location.href='login.html',1200); } catch(error) { msg.textContent=error.message || 'تعذر تغيير كلمة المرور.'; msg.className='error'; } finally { button.disabled=false; } });
  </script>
</body>
</html>

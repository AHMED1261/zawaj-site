<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تصفح البروفايلات</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container wide">
    <h1>تصفح البروفايلات</h1>

    <div class="filters">
      <label>النوع
        <select id="f_gender">
          <option value="">الكل</option>
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
      </label>

      <label>من سن
        <input type="number" id="f_minAge" min="18" max="90" placeholder="18">
      </label>

      <label>لحد سن
        <input type="number" id="f_maxAge" min="18" max="90" placeholder="90">
      </label>

      <label>الحالة الاجتماعية
        <select id="f_maritalStatus">
          <option value="">الكل</option>
          <option value="single">أعزب / آنسة</option>
          <option value="divorced">مطلق / مطلقة</option>
          <option value="widowed">أرمل / أرملة</option>
        </select>
      </label>

      <label>عايز يخلف؟
        <select id="f_wantsChildren">
          <option value="">الكل</option>
          <option value="yes">نعم</option>
          <option value="no">لا</option>
          <option value="maybe">لسه مش قرر</option>
        </select>
      </label>

      <label>المحافظة
        <input type="text" id="f_governorate" placeholder="مثلاً القاهرة">
      </label>

      <button id="applyFilters">فلترة</button>
    </div>

    <div id="results" class="grid"></div>
    <div id="pagination"></div>
  </div>

<script>
let currentPage = 1;

async function loadProfiles(page = 1) {
  currentPage = page;
  const params = new URLSearchParams();
  const gender = document.getElementById('f_gender').value;
  const minAge = document.getElementById('f_minAge').value;
  const maxAge = document.getElementById('f_maxAge').value;
  const maritalStatus = document.getElementById('f_maritalStatus').value;
  const wantsChildren = document.getElementById('f_wantsChildren').value;
  const governorate = document.getElementById('f_governorate').value;

  if (gender) params.set('gender', gender);
  if (minAge) params.set('minAge', minAge);
  if (maxAge) params.set('maxAge', maxAge);
  if (maritalStatus) params.set('maritalStatus', maritalStatus);
  if (wantsChildren) params.set('wantsChildren', wantsChildren);
  if (governorate) params.set('governorate', governorate);
  params.set('page', page);
  params.set('limit', 12);

  const res = await fetch('/api/profiles?' + params.toString());
  const result = await res.json();
  renderResults(result);
}

const maritalLabels = { single: 'أعزب/آنسة', divorced: 'مطلق/ة', widowed: 'أرمل/ة' };
const childrenLabels = { yes: 'عايز يخلف', no: 'مش عايز يخلف', maybe: 'لسه مقررش' };

function renderResults(result) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  if (!result.data.length) {
    container.innerHTML = '<p>مفيش نتائج مطابقة</p>';
  }

  result.data.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${p.name} (${p.age})</h3>
      <p>${p.governorate || ''} ${p.gender === 'male' ? '- ذكر' : '- أنثى'}</p>
      <p>${maritalLabels[p.marital_status] || ''} · ${childrenLabels[p.wants_children] || ''}</p>
      <p class="bio">${(p.bio || '').slice(0, 100)}</p>
    `;
    container.appendChild(card);
  });

  renderPagination(result.total, result.page, result.limit);
}

function renderPagination(total, page, limit) {
  const pages = Math.ceil(total / limit);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  for (let i = 1; i <= pages; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    if (i === page) btn.className = 'active';
    btn.onclick = () => loadProfiles(i);
    pag.appendChild(btn);
  }
}

document.getElementById('applyFilters').addEventListener('click', () => loadProfiles(1));
loadProfiles();
</script>
</body>
</html>
